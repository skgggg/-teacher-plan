<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>這張，懂我｜情緒解憂雜貨鋪</title>
    <style>
        :root {
            --ink: #463526;
            --muted: #755d46;
            --paper: #fff8df;
            --paper-deep: #f3d49a;
            --wood: #c58b55;
            --wood-dark: #7f512e;
            --wood-line: #a86f3d;
            --screen: #f9f1d4;
            --slot: #3d281f;
            --red: #d43f34;
            --red-dark: #8f251e;
            --note: #fff08b;
            --blue: #8aa9cf;
            --shadow: 0 24px 60px rgba(84, 54, 28, 0.24);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 18%, rgba(255,255,255,0.95) 0 2px, transparent 3px),
                radial-gradient(circle at 84% 12%, rgba(255,255,255,0.82) 0 2px, transparent 3px),
                linear-gradient(135deg, #fffaf0 0%, #f8e4bd 52%, #eecb91 100%);
            padding: 28px;
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        button { cursor: pointer; }

        .app {
            width: min(1280px, 100%);
            margin: 0 auto;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: end;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            color: #7f96cb;
            font-size: clamp(2.1rem, 4vw, 3.6rem);
            line-height: 1.04;
            letter-spacing: 0;
        }

        .hero p {
            max-width: 660px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 1.04rem;
            line-height: 1.7;
        }

        .hotline {
            min-width: 154px;
            padding: 12px 18px;
            border: 2px solid var(--wood-line);
            border-radius: 8px;
            background: rgba(255, 248, 223, 0.9);
            box-shadow: 6px 6px 0 rgba(128, 82, 42, 0.16);
            text-align: center;
        }

        .hotline strong {
            display: block;
            font-size: 2.05rem;
            line-height: 1;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(520px, 1.7fr) minmax(310px, 0.82fr);
            gap: 28px;
            align-items: start;
        }

        .machine {
            position: relative;
            min-height: 860px;
            padding: 92px 30px 28px;
            border: 5px solid var(--wood-dark);
            border-radius: 16px 16px 12px 12px;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.18), transparent 18% 82%, rgba(89, 55, 25, 0.1)),
                repeating-linear-gradient(90deg, #d8a168 0 34px, #cd9256 34px 66px);
            box-shadow: var(--shadow), inset 0 0 0 8px rgba(255, 236, 194, 0.45);
        }

        .machine::before,
        .machine::after {
            content: "";
            position: absolute;
            top: -28px;
            width: 10px;
            height: 36px;
            border-radius: 6px;
            background: var(--wood-dark);
        }

        .machine::before { left: 110px; }
        .machine::after { right: 110px; }

        .sign {
            position: absolute;
            top: 18px;
            left: 50%;
            width: min(430px, 72%);
            padding: 12px 16px 10px;
            transform: translateX(-50%);
            border: 3px solid var(--wood-dark);
            border-radius: 9px;
            background: #ffe2af;
            text-align: center;
            box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35);
        }

        .sign strong {
            display: block;
            font-size: 1.35rem;
        }

        .sign span {
            display: block;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .touch-screen {
            position: relative;
            min-height: 438px;
            padding: 18px;
            border: 5px solid var(--wood-dark);
            border-radius: 16px;
            background:
                linear-gradient(rgba(255,255,255,0.68), rgba(255,255,255,0.68)),
                radial-gradient(circle at 50% 36%, #fffdf0, #ead09d);
            box-shadow: inset 0 0 0 5px rgba(86, 52, 26, 0.08);
            overflow: hidden;
        }

        .screen-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .screen-tab {
            min-height: 38px;
            border: 2px solid rgba(126, 81, 46, 0.28);
            border-radius: 8px;
            background: rgba(255, 247, 222, 0.78);
            color: var(--wood-dark);
            font-weight: 900;
        }

        .screen-tab.active {
            background: #7f96cb;
            border-color: #536b9f;
            color: #fffdf2;
        }

        .screen-panel {
            display: none;
            min-height: 344px;
        }

        .screen-panel.active { display: block; }

        .start-panel {
            min-height: 330px;
            display: grid;
            place-items: center;
            text-align: center;
        }

        .start-button {
            min-width: 210px;
            min-height: 58px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(#fff0a8, #e2aa4b);
            color: #56371e;
            font-size: 1.08rem;
            font-weight: 900;
            box-shadow: 0 7px 0 #a56c2d;
        }

        .screen-title {
            margin: 0 0 12px;
            color: var(--wood-dark);
            font-size: 1.05rem;
            font-weight: 900;
            text-align: center;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .mood-btn {
            min-height: 64px;
            padding: 8px;
            border: 2px solid rgba(86, 52, 26, 0.22);
            border-radius: 9px;
            background: var(--mood-color);
            color: #3f3022;
            font-weight: 900;
            box-shadow: 0 4px 0 rgba(79, 51, 27, 0.14);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .mood-btn.active,
        .mood-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 rgba(79, 51, 27, 0.2);
            outline: 3px solid rgba(255,255,255,0.65);
        }

        .screen-status {
            min-height: 34px;
            margin-top: 14px;
            color: var(--wood-dark);
            font-weight: 900;
            text-align: center;
        }

        .screen-effect {
            min-height: 278px;
            display: grid;
            place-items: center;
            text-align: center;
        }

        .effect-note {
            position: relative;
            width: 180px;
            min-height: 150px;
            padding: 24px 18px;
            border-radius: 5px;
            background: var(--note);
            color: #5f4b20;
            font-weight: 900;
            box-shadow: 8px 8px 0 rgba(93, 66, 31, 0.16);
        }

        .effect-note.burn { animation: burnNote 1.45s ease forwards; }
        .effect-note.good { animation: glowNote 1.45s ease forwards; }

        .effect-note.burn::before,
        .effect-note.burn::after {
            content: "";
            position: absolute;
            left: 34px;
            bottom: -10px;
            width: 42px;
            height: 54px;
            border-radius: 48% 48% 48% 8%;
            background: #e9552d;
            transform: rotate(38deg);
            box-shadow: inset -12px -14px 0 #ffd260, 62px -4px 0 -8px #e9552d;
        }

        .effect-note.burn::after {
            left: 80px;
            bottom: -16px;
            width: 32px;
            height: 44px;
            background: #ffca52;
            opacity: 0.9;
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            max-height: 316px;
            overflow: auto;
            padding-right: 3px;
        }

        .catalog-card {
            min-height: 132px;
            padding: 10px 8px;
            border: 4px solid var(--card-color);
            border-radius: 7px;
            background: linear-gradient(135deg, rgba(255,255,255,0.68), rgba(255,255,255,0.1)), var(--card-soft);
            color: var(--card-ink);
            box-shadow: 4px 5px 0 rgba(71, 49, 31, 0.14);
            font-weight: 900;
        }

        .catalog-card b {
            display: block;
            margin-bottom: 7px;
            font-size: 0.95rem;
        }

        .catalog-card span {
            display: block;
            color: #4d3d2a;
            font-size: 0.72rem;
            line-height: 1.45;
        }

        .printer-row {
            display: grid;
            grid-template-columns: 1fr 164px;
            gap: 18px;
            align-items: center;
            margin: 22px 0 18px;
        }

        .print-label {
            min-height: 54px;
            display: grid;
            align-items: center;
            padding: 10px 16px;
            border: 3px solid var(--wood-dark);
            border-radius: 10px;
            background: rgba(255, 239, 204, 0.86);
            color: var(--wood-dark);
            font-weight: 900;
        }

        .print-button {
            min-height: 72px;
            border: 0;
            border-radius: 999px;
            background: radial-gradient(circle at 40% 26%, #ff8f7c, var(--red) 54%, var(--red-dark) 100%);
            color: #fff8eb;
            font-size: 1.08rem;
            font-weight: 900;
            box-shadow: 0 10px 0 #691a16, inset 0 0 0 4px rgba(255,255,255,0.18);
        }

        .print-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #691a16, inset 0 0 0 4px rgba(255,255,255,0.18);
        }

        .output-slot {
            position: relative;
            min-height: 250px;
            display: grid;
            place-items: center;
            border: 5px solid var(--wood-dark);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent), #68442f;
            box-shadow: inset 0 8px 18px rgba(0,0,0,0.28);
            overflow: hidden;
        }

        .output-slot::before {
            content: "";
            position: absolute;
            top: 26px;
            left: 50%;
            width: 78%;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: var(--slot);
            box-shadow: inset 0 7px 10px rgba(0,0,0,0.45);
        }

        .emotion-card {
            --card-color: #f6d66c;
            --card-soft: #fff3bf;
            --card-ink: #5a3a28;
            position: relative;
            z-index: 1;
            width: 174px;
            height: 236px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 7px;
            padding: 12px 11px 10px;
            border: 5px solid var(--card-color);
            border-radius: 7px;
            background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.16)), var(--card-soft);
            color: var(--ink);
            text-align: center;
            box-shadow: 8px 9px 0 rgba(73, 50, 31, 0.18), inset 0 0 0 2px rgba(255,255,255,0.7);
            opacity: 1;
        }

        .emotion-card.printed { animation: printCard 0.72s cubic-bezier(.2,.72,.18,1.14) forwards; }

        .emotion-card::before,
        .emotion-card::after {
            content: "";
            position: absolute;
            inset: 9px;
            border: 1px solid rgba(92, 67, 44, 0.24);
            border-radius: 5px;
            pointer-events: none;
        }

        .emotion-card::after {
            inset: 14px;
            border-color: rgba(92, 67, 44, 0.16);
        }

        .card-kicker {
            position: relative;
            z-index: 1;
            justify-self: center;
            min-height: 22px;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.58);
            color: var(--card-ink);
            font-size: 0.68rem;
            font-weight: 900;
        }

        .card-face {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 6px;
            min-height: 0;
        }

        .card-title {
            color: var(--card-ink);
            font-size: 1.55rem;
            font-weight: 900;
            line-height: 1;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.78);
        }

        .card-scene {
            position: relative;
            height: 94px;
            border-radius: 5px;
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0 58%, rgba(117,84,54,0.13) 59% 100%);
            overflow: hidden;
        }

        .card-scene::before,
        .card-scene::after {
            content: "";
            position: absolute;
        }

        .card-scene::before {
            left: 50%;
            bottom: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50% 50% 44% 44%;
            background: #f1bd9a;
            transform: translateX(-50%);
            box-shadow: 0 22px 0 8px #6586a7;
        }

        .card-scene::after {
            left: 41%;
            bottom: 32px;
            width: 18px;
            height: 8px;
            border-radius: 10px 10px 3px 3px;
            background: #4d372d;
            transform: rotate(-7deg);
        }

        .scene-rain { background: repeating-linear-gradient(100deg, transparent 0 13px, rgba(80,111,145,0.3) 14px 16px), linear-gradient(180deg, #c7d9ed 0 58%, #9fb8cc 59% 100%); }
        .scene-flame { background: radial-gradient(circle at 76% 27%, #ffe37a 0 9px, transparent 10px), linear-gradient(180deg, #ffd6ad 0 58%, #d98d67 59% 100%); }
        .scene-star { background: radial-gradient(circle at 17% 22%, #fff2a0 0 5px, transparent 6px), radial-gradient(circle at 84% 22%, #fff2a0 0 4px, transparent 5px), linear-gradient(180deg, #ffeab0 0 58%, #e6b66e 59% 100%); }
        .scene-moon { background: radial-gradient(circle at 78% 22%, #fff2b4 0 17px, transparent 18px), linear-gradient(180deg, #a9c7e2 0 58%, #7897bb 59% 100%); }
        .scene-bubble { background: radial-gradient(circle at 16% 18%, #fff8e7 0 11px, transparent 12px), radial-gradient(circle at 82% 23%, #fff8e7 0 15px, transparent 16px), linear-gradient(180deg, #f2c796 0 58%, #c98958 59% 100%); }
        .scene-water { background: repeating-radial-gradient(ellipse at center 70%, rgba(66,123,150,0.25) 0 4px, transparent 5px 16px), linear-gradient(180deg, #c7e6eb 0 58%, #8bbac5 59% 100%); }
        .scene-leaf { background: radial-gradient(circle at 80% 25%, #eff6d3 0 10px, transparent 11px), linear-gradient(180deg, #dbe5c8 0 58%, #96ac7c 59% 100%); }

        .card-line {
            position: relative;
            z-index: 1;
            min-height: 44px;
            display: grid;
            place-items: center;
            padding: 5px 7px;
            border: 1px solid rgba(92,67,44,0.26);
            border-radius: 5px;
            background: rgba(255,253,242,0.76);
            color: #4d3d2a;
            font-size: 0.7rem;
            font-weight: 900;
            line-height: 1.35;
        }

        .card-footer {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: var(--card-ink);
            font-size: 0.64rem;
            font-weight: 900;
        }

        .machine-base {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            padding: 12px 14px;
            border: 3px solid var(--wood-dark);
            border-radius: 9px;
            background: #b87948;
            color: #fff9ea;
            font-weight: 900;
        }

        .dial {
            display: grid;
            place-items: center;
            min-width: 92px;
            min-height: 38px;
            border-radius: 999px;
            background: #fff1c7;
            color: var(--wood-dark);
            font-size: 1.08rem;
        }

        .note-panel {
            position: sticky;
            top: 22px;
            display: grid;
            gap: 16px;
        }

        .note-unit {
            padding: 18px;
            border: 4px solid var(--wood-dark);
            border-radius: 14px;
            background: linear-gradient(90deg, rgba(255,255,255,0.16), transparent 80%), repeating-linear-gradient(90deg, #d7a064 0 28px, #cb9258 28px 56px);
            box-shadow: var(--shadow);
        }

        .port-title {
            margin: 0 0 10px;
            color: #fff8df;
            font-size: 1.05rem;
            font-weight: 900;
        }

        .note-dispenser {
            min-height: 108px;
            display: grid;
            place-items: center;
            margin-bottom: 16px;
            border: 4px solid var(--wood-dark);
            border-radius: 12px;
            background: #6a4530;
            box-shadow: inset 0 7px 16px rgba(0,0,0,0.3);
        }

        .note-stack {
            width: 150px;
            height: 82px;
            position: relative;
            border-radius: 4px;
            background: var(--note);
            transform: rotate(-2deg);
            box-shadow: 8px 8px 0 rgba(39, 25, 15, 0.22);
        }

        .note-stack::before,
        .note-stack::after {
            content: "";
            position: absolute;
            inset: 8px -8px -8px 8px;
            border-radius: 4px;
            background: #ffe477;
            z-index: -1;
        }

        .note-stack::after {
            inset: 16px -16px -16px 16px;
            background: #ffd968;
            z-index: -2;
        }

        .note-editor {
            padding: 16px;
            border: 3px solid var(--wood-dark);
            border-radius: 12px;
            background: rgba(255, 246, 219, 0.9);
        }

        .note {
            width: 100%;
            min-height: 160px;
            padding: 16px;
            border: 0;
            outline: 0;
            resize: vertical;
            border-radius: 4px;
            background: linear-gradient(135deg, transparent 0 83%, rgba(173,140,29,0.22) 84% 100%), var(--note);
            color: #4d3b22;
            line-height: 1.7;
            box-shadow: 7px 7px 0 rgba(77, 50, 25, 0.15);
        }

        .note-controls {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .segmented {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .segment-btn {
            min-height: 42px;
            border: 2px solid rgba(126, 81, 46, 0.28);
            border-radius: 8px;
            background: #fff9e8;
            color: var(--wood-dark);
            font-weight: 900;
        }

        .segment-btn.active[data-kind="bad"] {
            background: #e87562;
            color: #fff9ea;
            border-color: #bd4f42;
        }

        .segment-btn.active[data-kind="good"] {
            background: #efca60;
            color: #5a3a18;
            border-color: #c8952e;
        }

        .contact-row {
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-weight: 900;
        }

        .contact-input {
            display: none;
            width: 100%;
            min-height: 42px;
            padding: 9px 12px;
            border: 2px solid rgba(126, 81, 46, 0.3);
            border-radius: 8px;
            background: #fffdf3;
            color: var(--ink);
        }

        .contact-input.show { display: block; }

        .deposit-slot {
            min-height: 76px;
            display: grid;
            place-items: center;
            margin-top: 16px;
            border: 4px solid var(--wood-dark);
            border-radius: 999px;
            background: var(--slot);
            color: #f7dfb2;
            font-weight: 900;
            box-shadow: inset 0 8px 16px rgba(0,0,0,0.42);
        }

        .deposit-button {
            width: 100%;
            min-height: 52px;
            border: 0;
            border-radius: 8px;
            background: #65412d;
            color: #fff9ea;
            font-weight: 900;
            box-shadow: 0 6px 0 #362116;
        }

        .note-status {
            min-height: 28px;
            margin-top: 10px;
            color: var(--wood-dark);
            font-weight: 900;
            text-align: center;
        }

        @keyframes printCard {
            0% { opacity: 0; transform: translateY(-160px) rotate(-7deg); }
            72% { opacity: 1; transform: translateY(10px) rotate(2deg); }
            100% { opacity: 1; transform: translateY(0) rotate(0); }
        }

        @keyframes burnNote {
            0% { opacity: 1; transform: translateY(0) rotate(-1deg); filter: brightness(1); }
            52% { opacity: 1; transform: translateY(-6px) rotate(2deg); filter: brightness(1.08) saturate(1.2); }
            100% { opacity: 0; transform: translateY(-26px) rotate(7deg) scale(0.78); filter: brightness(0.45) grayscale(1); }
        }

        @keyframes glowNote {
            0% { transform: translateY(0) scale(0.96); opacity: 0.2; }
            35% { transform: translateY(-4px) scale(1.02); opacity: 1; box-shadow: 0 0 0 rgba(255,213,74,0); }
            100% { transform: translateY(-8px) scale(1); opacity: 1; box-shadow: 0 0 38px rgba(255,213,74,0.72); }
        }

        @media (max-width: 980px) {
            body { padding: 20px; }
            .hero { grid-template-columns: 1fr; }
            .layout { grid-template-columns: 1fr; }
            .note-panel { position: static; }
        }

        @media (max-width: 560px) {
            body { padding: 14px; }
            .machine { min-height: 820px; padding: 88px 16px 20px; }
            .sign { width: 82%; }
            .mood-grid,
            .card-list,
            .printer-row { grid-template-columns: 1fr; }
            .print-button { min-height: 62px; }
            .touch-screen { min-height: 500px; }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="hero">
            <div>
                <h1>這張，懂我</h1>
                <p>左側機台完成抽卡與螢幕回饋，右側便利貼區用來投遞心情。張老師與 1980 保留在機台底部。</p>
            </div>
            <div class="hotline" aria-label="張老師服務專線">
                <span>張老師專線</span>
                <strong>1980</strong>
            </div>
        </header>

        <section class="layout">
            <section class="machine" aria-label="情緒解憂雜貨鋪機台">
                <div class="sign">
                    <strong>情緒解憂雜貨鋪</strong>
                    <span>TOUCH / PRINT / DELIVER</span>
                </div>

                <div class="touch-screen" aria-live="polite">
                    <nav class="screen-tabs" aria-label="螢幕分頁">
                        <button type="button" class="screen-tab active" data-tab="draw">抽卡</button>
                        <button type="button" class="screen-tab" data-tab="note">便利貼</button>
                        <button type="button" class="screen-tab" data-tab="cards">卡片清單</button>
                    </nav>

                    <section class="screen-panel active" id="panel-draw">
                        <div class="start-panel" id="startPanel">
                            <button type="button" class="start-button" id="startButton">觸碰螢幕開始</button>
                        </div>
                        <div id="moodPanel" hidden>
                            <p class="screen-title">選擇此刻心情</p>
                            <div class="mood-grid" id="moodGrid"></div>
                            <div class="screen-status" id="screenStatus">等待觸控選擇</div>
                        </div>
                    </section>

                    <section class="screen-panel" id="panel-note">
                        <div class="screen-effect" id="screenEffect">
                            <div class="effect-note">便利貼狀態會顯示在這裡</div>
                        </div>
                    </section>

                    <section class="screen-panel" id="panel-cards">
                        <p class="screen-title">卡片清單</p>
                        <div class="card-list" id="cardList"></div>
                    </section>
                </div>

                <div class="printer-row">
                    <div class="print-label" id="printLabel">目前卡片：等待選擇</div>
                    <button type="button" class="print-button" id="printButton">紅色列印</button>
                </div>

                <div class="output-slot" aria-label="卡片輸出口">
                    <div class="emotion-card" id="printedCard">
                        <div class="card-kicker">EMOTION CARD</div>
                        <div class="card-face">
                            <div class="card-title">等待列印</div>
                            <div class="card-scene scene-star"></div>
                            <div class="card-line">觸碰螢幕，選心情，再按紅色按鈕。</div>
                        </div>
                        <div class="card-footer"><strong>張老師</strong><span>1980</span></div>
                    </div>
                </div>

                <div class="machine-base">
                    <span>張老師｜陪伴你整理情緒</span>
                    <span class="dial">1980</span>
                </div>
            </section>

            <aside class="note-panel" aria-label="便利貼投遞區">
                <section class="note-unit">
                    <h2 class="port-title">便利貼拿取口</h2>
                    <div class="note-dispenser" aria-hidden="true">
                        <div class="note-stack"></div>
                    </div>

                    <div class="note-editor">
                        <textarea class="note" id="noteInput" aria-label="寫下心情" placeholder="寫下想投遞的心情..."></textarea>
                        <div class="note-controls">
                            <div class="segmented" aria-label="投遞心情類型">
                                <button type="button" class="segment-btn active" data-kind="bad">壞心情</button>
                                <button type="button" class="segment-btn" data-kind="good">好心情</button>
                            </div>

                            <label class="contact-row">
                                <input type="checkbox" id="contactToggle">
                                <span>寫入聯絡資訊</span>
                            </label>
                            <input class="contact-input" id="contactInput" type="text" placeholder="電話或 Email（選填）">

                            <button type="button" class="deposit-button" id="depositButton">投入便利貼</button>
                        </div>
                        <div class="deposit-slot">投入口</div>
                        <div class="note-status" id="noteStatus"></div>
                    </div>
                </section>
            </aside>
        </section>
    </main>

    <script>
        const cards = [
            { label: "不開心", color: "#9fb8d2", soft: "#d8e7f5", ink: "#304a67", icon: "rain", kind: "bad", lines: ["先陪自己難過一下，也是一種勇敢。", "今天不用很快好起來，先被接住就好。", "眼淚不是失敗，是心正在排水。"] },
            { label: "生氣", color: "#df5d4f", soft: "#ffd9bd", ink: "#763125", icon: "flame", kind: "bad", lines: ["火很燙，先不要急著吞下去。", "你可以生氣，也可以慢慢說。", "這團火正在提醒你：某件事很重要。"] },
            { label: "開心", color: "#f6d66c", soft: "#fff0a8", ink: "#8a5a12", icon: "star", kind: "good", lines: ["把今天的亮光留一點給明天。", "快樂值得被記得，不用偷偷收起來。", "這一刻很好，你也很好。"] },
            { label: "愛睏巴巴", color: "#80a8d8", soft: "#cfe2f2", ink: "#314f72", icon: "moon", kind: "bad", lines: ["你不是偷懶，你可能只是累了。", "先讓身體回電，心才有力氣。", "休息不是暫停人生，是補充燃料。"] },
            { label: "你不懂啦", color: "#d49a6a", soft: "#f5cfaa", ink: "#704329", icon: "bubble", kind: "bad", lines: ["被懂之前，先不用急著解釋完美。", "說不清楚也沒關係，感受本來就會打結。", "你可以先保留，也可以慢慢讓人靠近。"] },
            { label: "心如止水", color: "#b8dce5", soft: "#d8eef1", ink: "#356271", icon: "water", kind: "good", lines: ["平靜也可以是一種正在整理。", "安靜不是空白，是心有了空間。", "讓水面慢慢穩下來，答案會比較清楚。"] },
            { label: "無奈", color: "#cbd0c5", soft: "#e0e7cf", ink: "#5b6542", icon: "leaf", kind: "bad", lines: ["卡住的地方，也許需要一個出口。", "不是所有事情都要你一個人扛。", "先承認很難，再找一個小小的下一步。"] }
        ];

        const moodGrid = document.getElementById("moodGrid");
        const cardList = document.getElementById("cardList");
        const printedCard = document.getElementById("printedCard");
        const printButton = document.getElementById("printButton");
        const printLabel = document.getElementById("printLabel");
        const startButton = document.getElementById("startButton");
        const startPanel = document.getElementById("startPanel");
        const moodPanel = document.getElementById("moodPanel");
        const screenStatus = document.getElementById("screenStatus");
        const screenEffect = document.getElementById("screenEffect");
        const noteInput = document.getElementById("noteInput");
        const noteStatus = document.getElementById("noteStatus");
        const depositButton = document.getElementById("depositButton");
        const contactToggle = document.getElementById("contactToggle");
        const contactInput = document.getElementById("contactInput");
        let selectedCard = null;
        let noteKind = "bad";

        function pickLine(card) {
            return card.lines[Math.floor(Math.random() * card.lines.length)];
        }

        function setTab(tabName) {
            document.querySelectorAll(".screen-tab").forEach(button => {
                button.classList.toggle("active", button.dataset.tab === tabName);
            });
            document.querySelectorAll(".screen-panel").forEach(panel => {
                panel.classList.toggle("active", panel.id === `panel-${tabName}`);
            });
        }

        function renderPrintedCard(card, line, animate = true) {
            printedCard.classList.remove("printed");
            printedCard.style.setProperty("--card-color", card.color);
            printedCard.style.setProperty("--card-soft", card.soft);
            printedCard.style.setProperty("--card-ink", card.ink);
            printedCard.innerHTML = `
                <div class="card-kicker">EMOTION CARD</div>
                <div class="card-face">
                    <div class="card-title">${card.label}</div>
                    <div class="card-scene scene-${card.icon}"></div>
                    <div class="card-line">${line}</div>
                </div>
                <div class="card-footer"><strong>張老師</strong><span>1980</span></div>
            `;
            if (animate) {
                void printedCard.offsetWidth;
                printedCard.classList.add("printed");
            }
        }

        function renderMoodButtons() {
            moodGrid.innerHTML = "";
            cards.forEach(card => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "mood-btn";
                button.textContent = card.label;
                button.style.setProperty("--mood-color", card.soft);
                button.addEventListener("click", () => {
                    selectedCard = card;
                    document.querySelectorAll(".mood-btn").forEach(item => item.classList.remove("active"));
                    button.classList.add("active");
                    screenStatus.textContent = `已選擇：${card.label}`;
                    printLabel.textContent = `目前卡片：${card.label}`;
                });
                moodGrid.appendChild(button);
            });
        }

        function renderCardList() {
            cardList.innerHTML = "";
            cards.forEach(card => {
                const item = document.createElement("button");
                item.type = "button";
                item.className = "catalog-card";
                item.style.setProperty("--card-color", card.color);
                item.style.setProperty("--card-soft", card.soft);
                item.style.setProperty("--card-ink", card.ink);
                item.innerHTML = `<b>${card.label}</b><span>${card.lines[0]}</span>`;
                item.addEventListener("click", () => {
                    selectedCard = card;
                    renderPrintedCard(card, pickLine(card));
                    printLabel.textContent = `目前卡片：${card.label}`;
                    setTab("draw");
                    startPanel.hidden = true;
                    moodPanel.hidden = false;
                    screenStatus.textContent = `已從清單選取：${card.label}`;
                });
                cardList.appendChild(item);
            });
        }

        function renderScreenNote(kind) {
            const text = kind === "bad" ? "壞心情已投入，螢幕正在燒掉便條紙。" : "好心情已投入，螢幕正在保存這份亮光。";
            const className = kind === "bad" ? "burn" : "good";
            screenEffect.innerHTML = `<div class="effect-note ${className}">${text}</div>`;
        }

        startButton.addEventListener("click", () => {
            startPanel.hidden = true;
            moodPanel.hidden = false;
            screenStatus.textContent = "請選擇一張心情卡";
        });

        printButton.addEventListener("click", () => {
            if (!selectedCard) {
                screenStatus.textContent = "先在螢幕選擇心情";
                setTab("draw");
                startPanel.hidden = true;
                moodPanel.hidden = false;
                return;
            }
            renderPrintedCard(selectedCard, pickLine(selectedCard));
            screenStatus.textContent = `${selectedCard.label} 小卡已印出`;
        });

        document.querySelectorAll(".screen-tab").forEach(button => {
            button.addEventListener("click", () => setTab(button.dataset.tab));
        });

        document.querySelectorAll(".segment-btn").forEach(button => {
            button.addEventListener("click", () => {
                noteKind = button.dataset.kind;
                document.querySelectorAll(".segment-btn").forEach(item => item.classList.remove("active"));
                button.classList.add("active");
            });
        });

        contactToggle.addEventListener("change", () => {
            contactInput.classList.toggle("show", contactToggle.checked);
            if (!contactToggle.checked) contactInput.value = "";
        });

        depositButton.addEventListener("click", () => {
            const note = noteInput.value.trim();
            if (!note) {
                noteStatus.textContent = "先寫下一點心情，再投入。";
                noteInput.focus();
                return;
            }
            setTab("note");
            renderScreenNote(noteKind);
            noteStatus.textContent = noteKind === "bad" ? "壞心情已投入。" : "好心情已投入。";
            noteInput.value = "";
            contactInput.value = "";
            contactToggle.checked = false;
            contactInput.classList.remove("show");
        });

        renderMoodButtons();
        renderCardList();
    </script>
</body>
</html>
